# SacramentuOS GRUB configuration
# Debug-friendly: shows the menu instead of instantly hiding GRUB.

set timeout=5
set default=0
set gfxpayload=text
terminal_output console

menuentry "SacramentuOS 0.2.1" {
    echo "Loading SacramentuOS kernel..."
    insmod multiboot
    multiboot /boot/sacramentuos.kernel
    echo "Starting kernel..."
    boot
}

menuentry "Reboot" {
    reboot
}

menuentry "Poweroff" {
    halt
}
